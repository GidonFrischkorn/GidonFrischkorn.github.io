overview:
  en: "4 lecture courses; more than 10 seminars; 6 workshops"
  de: "4 Vorlesungen; mehr als 10 Seminare; 6 Workshops"

lectures:
  - title:
      en: "Statistics I"
      de: "Statistik I"
    program:
      en: "B.Sc. Psychology, approx. 150 students"
      de: "B.Sc. Psychologie, ca. 150 Studierende"
    institution:
      en: "University of Lucerne"
      de: "Universität Luzern"
    date: "HS 2025"
    details:
      en: "3 contact hours/week; 5 ECTS"
      de: "3 SWS; 5 ECTS"
    evaluation:
      en: "Overall course rating: 3.0; Instructor: 3.4 (first delivery; large mandatory introductory cohort)"
      de: "Gesamtbewertung: 3.0; Dozent: 3.4 (erstmalige Durchführung; grosse Pflicht-Einführungskohorte)"

  - title:
      en: "Statistics IV (Reproducible Data Analysis in R)"
      de: "Statistik IV (Reproduzible Datenanalyse in R)"
    program:
      en: "B.Sc. Psychology, approx. 80 students"
      de: "B.Sc. Psychologie, ca. 80 Studierende"
    institution:
      en: "University of Lucerne"
      de: "Universität Luzern"
    date: "FS 2026"
    details:
      en: "Reproducible data analysis in R with interactive Quarto/webR exercise materials"
      de: "Reproduzible Datenanalyse in R mit interaktiven Quarto/webR-Übungsmaterialien"
    # TODO: SWS/ECTS und genaue Lehrrolle (Vorlesung vs. Übung) bestätigen; ggf. offizielle Gesamtbewertung/Dozent-Werte wie bei Statistik I einsetzen
    evaluation:
      en: "Clearly positive evaluation (1–6 scale; item medians 5–6): e.g., learning climate 5.2, instructor contact 5.7"
      de: "Klar positive Evaluation (6er-Skala; Item-Mediane 5–6): u.a. Lernklima 5.2, Betreuung 5.7"

  - title:
      en: "Cognitive Psychology I"
      de: "Kognitionspsychologie I"
    program:
      en: "B.Sc. Psychology, approx. 800 students"
      de: "B.Sc. Psychologie, ca. 800 Studierende"
    institution:
      en: "University of Zurich"
      de: "Universität Zürich"
    date: "FS 2021"
    details:
      en: "2 contact hours/week; 3 ECTS; co-taught with Dr. Lea Bartsch; fully responsible for 6 of 12 lectures and 50% of the exam"
      de: "2 SWS; 3 ECTS; Ko-Lehre mit Dr. Lea Bartsch; vollständig verantwortlich für 6 von 12 Vorlesungen und 50% der Prüfung"

